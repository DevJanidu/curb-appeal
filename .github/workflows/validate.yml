name: Validate plugin
on:
  push:
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python scripts/validate_plugin.py
      - run: python skills/project-detector/scripts/detect_project.py .
